# =====================================================
# COMPLETE MODERN YAML CI/CD PIPELINE
# Java Maven + Selenium + Playwright + Production
# Azure DevOps Multi-Stage Pipeline
# =====================================================

trigger:
- master

# =====================================================
# REPOSITORIES
# =====================================================

resources:
  repositories:

    # =========================================
    # JAVA APPLICATION REPOSITORY
    # =========================================

    - repository: JavaRepo
      type: git
      name: AzureDemoGanesh/AzureDemoGanesh

    # =========================================
    # PLAYWRIGHT AUTOMATION REPOSITORY
    # =========================================

    - repository: PlaywrightRepo
      type: git
      name: AzureDemoGanesh/PlaywrightInit.git

# =====================================================
# VARIABLES
# =====================================================

variables:

  # =========================================
  # QA ENVIRONMENT
  # =========================================

  azureSubscription: 'ca8cbce7-1314-49cb-8f4e-db8b3db5a802'
  webAppName: 'Ganesh'
  environmentName: 'Ganesh'

  # =========================================
  # PRODUCTION ENVIRONMENT
  # =========================================

  productionWebAppName: 'prodganesh'
  productionEnvironmentName: 'Production'

  # =========================================
  # AGENT VM IMAGE
  # =========================================

  vmImageName: 'ubuntu-latest'

# =====================================================
# STAGES
# =====================================================

stages:

# =====================================================
# BUILD STAGE
# =====================================================

- stage: Build
  displayName: Build Stage

  jobs:

  - job: BuildJob
    displayName: Maven Build Job

    pool:
      vmImage: $(vmImageName)

    steps:

    # Checkout Java Repository
    - checkout: JavaRepo

    # Display Repository Files
    - script: |
        echo "Current Directory"
        pwd

        echo "Repository Files"
        ls -R
      displayName: Display Repository Files

    # Maven Build
    - task: Maven@4
      displayName: Maven Package

      inputs:
        mavenPomFile: 'pom.xml'
        goals: 'clean package -DskipTests'
        publishJUnitResults: false
        javaHomeOption: 'JDKVersion'
        jdkVersionOption: '1.8'
        jdkArchitectureOption: 'x64'

    # Verify WAR File
    - script: |
        echo "WAR Files"
        find . -name "*.war"
      displayName: Find WAR File

    # Copy WAR File
    - task: CopyFiles@2
      displayName: Copy WAR File

      inputs:
        SourceFolder: '$(System.DefaultWorkingDirectory)/target'
        Contents: '*.war'
        TargetFolder: '$(Build.ArtifactStagingDirectory)'

    # Display Artifact Files
    - script: |
        echo "Artifact Files"
        ls -R $(Build.ArtifactStagingDirectory)
      displayName: Display Artifact Files

    # Publish WAR Artifact
    - publish: $(Build.ArtifactStagingDirectory)
      artifact: warfile

# =====================================================
# QA DEPLOYMENT STAGE
# =====================================================

- stage: DeployQA
  displayName: QA Deployment Stage

  dependsOn: Build
  condition: succeeded()

  jobs:

  - deployment: DeployToQA
    displayName: Deploy To QA Server

    environment: $(environmentName)

    pool:
      vmImage: $(vmImageName)

    strategy:
      runOnce:
        deploy:

          steps:

          # Download WAR Artifact
          - download: current
            artifact: warfile

          # Display Downloaded Artifacts
          - script: |
              echo "Downloaded Artifact Files"
              ls -R $(Pipeline.Workspace)
            displayName: Display Downloaded Artifacts

          # Deploy WAR To QA Azure Web App
          - task: AzureWebApp@1
            displayName: Deploy WAR To QA Web App

            inputs:
              azureSubscription: $(azureSubscription)
              appType: webAppLinux
              appName: $(webAppName)
              package: '$(Pipeline.Workspace)/warfile/*.war'

# =====================================================
# SELENIUM REGRESSION AUTOMATION STAGE
# =====================================================

- stage: RegressionAutomation
  displayName: Regression Automation Stage

  dependsOn: DeployQA
  condition: succeeded()

  jobs:

  - job: RunRegressionTests
    displayName: Run Selenium Regression Tests

    pool:
      vmImage: $(vmImageName)

    steps:

    # Checkout Java Repository
    - checkout: JavaRepo

    # Run Selenium Tests
    - task: Maven@4
      displayName: Run Selenium Tests

      inputs:
        mavenPomFile: 'pom.xml'
        goals: 'clean test'
        publishJUnitResults: true
        testResultsFiles: '**/surefire-reports/TEST-*.xml'
        javaHomeOption: 'JDKVersion'
        jdkVersionOption: '1.8'
        jdkArchitectureOption: 'x64'

    # Publish Selenium Test Results
    - task: PublishTestResults@2
      displayName: Publish Selenium Test Results

      inputs:
        testResultsFormat: 'JUnit'
        testResultsFiles: '**/surefire-reports/TEST-*.xml'
        failTaskOnFailedTests: true

# =====================================================
# PLAYWRIGHT JS TEST STAGE
# =====================================================

- stage: PlaywrightJS
  displayName: Playwright JS Stage

  dependsOn: RegressionAutomation
  condition: succeeded()

  jobs:

  - job: RunPlaywrightTests
    displayName: Run Playwright JavaScript Tests

    pool:
      vmImage: $(vmImageName)

    steps:

    # Checkout Playwright Repository
    - checkout: PlaywrightRepo

    # Display Playwright Repository Files
    - script: |
        echo "Playwright Repository Files"
        pwd
        ls -R
      displayName: Display Playwright Files

    # Install Node.js
    - task: NodeTool@0
      displayName: Install Node.js

      inputs:
        versionSpec: '18.x'

    # Verify Node.js and NPM
    - script: |
        node -v
        npm -v
      displayName: Check Node Version

    # Install NPM Packages
    - script: |
        npm install
      workingDirectory: '$(Build.SourcesDirectory)/PlaywrightInit.git'
      displayName: Install NPM Packages

    # Install Playwright Browsers
    - script: |
        npx playwright install --with-deps
      workingDirectory: '$(Build.SourcesDirectory)/PlaywrightInit.git'
      displayName: Install Playwright Browsers

    # Run Playwright Tests
    - script: |
        npx playwright test
      workingDirectory: '$(Build.SourcesDirectory)/PlaywrightInit.git'
      displayName: Run Playwright Tests

    # Publish Playwright HTML Report
    - task: PublishPipelineArtifact@1
      displayName: Publish Playwright Report

      condition: always()

      inputs:
        targetPath: '$(Build.SourcesDirectory)/PlaywrightInit.git/playwright-report'
        artifact: 'playwright-report'
        publishLocation: 'pipeline'

# =====================================================
# PRODUCTION DEPLOYMENT STAGE
# =====================================================

- stage: Production
  displayName: Production Deployment Stage

  dependsOn: PlaywrightJS
  condition: succeeded()

  jobs:

  - deployment: DeployToProduction
    displayName: Deploy To Production Server

    environment: $(productionEnvironmentName)

    pool:
      vmImage: $(vmImageName)

    strategy:
      runOnce:
        deploy:

          steps:

          # Download WAR Artifact
          - download: current
            artifact: warfile

          # Display Production Artifact Files
          - script: |
              echo "Production Artifact Files"
              ls -R $(Pipeline.Workspace)
            displayName: Display Production Files

          # Deploy WAR To Production Azure Web App
          - task: AzureRmWebAppDeployment@5
            displayName: Deploy WAR To Production Web App

            inputs:
              ConnectionType: 'AzureRM'
              azureSubscription: 'Azure subscription 1 (6f6373fe-b7a1-4a65-b9b5-2ef633e1fcc9)'
              appType: 'webAppLinux'
              WebAppName: 'prodganesh'
              packageForLinux: '$(Pipeline.Workspace)/warfile/*.war'
              DeploymentTypeLinux: 'oneDeploy'