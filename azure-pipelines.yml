trigger:
- master

# =====================================================
# PLAYWRIGHT REPOSITORY
# =====================================================

resources:
  repositories:

    - repository: PlaywrightRepo
      type: git
      name: AzureDemoGanesh/PlaywrightInit.git

# =====================================================
# PLAYWRIGHT STAGE
# =====================================================

stages:

- stage: PlaywrightJS
  displayName: Playwright JS Stage

  jobs:

  - job: RunPlaywrightTests
    displayName: Run Playwright Tests

    pool:
      vmImage: 'ubuntu-latest'

    steps:

    # Checkout Playwright Repository
    - checkout: PlaywrightRepo

    # Display Repository Files
    - script: |
        echo "Current Directory"
        pwd

        echo "Playwright Repository Files"
        ls -R
      displayName: Display Playwright Repository Files

    # Install Node.js
    - task: NodeTool@0
      displayName: Install Node.js

      inputs:
        versionSpec: '22.x'

    # Verify Node.js and NPM
    - script: |
        node -v
        npm -v
      displayName: Check Node Version

    # Install NPM Packages
    - script: |
        npm install
      workingDirectory: '$(Build.SourcesDirectory)/PlaywrightInit.git'
      displayName: Install NPM Packages

    # Install Playwright Browsers
    - script: |
        npx playwright install --with-deps
      workingDirectory: '$(Build.SourcesDirectory)/PlaywrightInit.git'
      displayName: Install Playwright Browsers

    # Run Playwright Tests
    - script: |
        npx playwright test
      workingDirectory: '$(Build.SourcesDirectory)/PlaywrightInit.git'
      displayName: Run Playwright Tests

    # Publish Playwright Report
    - task: PublishPipelineArtifact@1
      displayName: Publish Playwright Report

      condition: always()

      inputs:
        targetPath: '$(Build.SourcesDirectory)/PlaywrightInit.git/playwright-report'
        artifact: 'playwright-report'
        publishLocation: 'pipeline'