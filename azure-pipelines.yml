trigger:
- master

# =====================================================
# PLAYWRIGHT REPOSITORY
# =====================================================

resources:
  repositories:

    - repository: PlaywrightRepo
      type: git
      name: AzureDemoGanesh/PlaywrightInit.git

# =====================================================
# PLAYWRIGHT PIPELINE
# =====================================================

pool:
  vmImage: 'ubuntu-latest'

steps:

# =====================================================
# CHECKOUT PLAYWRIGHT REPOSITORY
# =====================================================

- checkout: PlaywrightRepo

# =====================================================
# DISPLAY REPOSITORY FILES
# =====================================================

- script: |
    echo "Current Directory"
    pwd

    echo "Repository Files"
    ls -R $(Build.SourcesDirectory)
  displayName: Display Repository Files

# =====================================================
# INSTALL NODE.JS
# =====================================================

- task: NodeTool@0
  displayName: Install Node.js

  inputs:
    versionSpec: '18.x'

# =====================================================
# VERIFY NODE.JS AND NPM
# =====================================================

- script: |
    node -v
    npm -v
  displayName: Check Node Version

# =====================================================
# INSTALL NPM PACKAGES
# =====================================================

- script: |
    cd $(Build.SourcesDirectory)

    echo "Available Folders"
    ls

    cd *

    echo "Inside Repository"
    pwd
    ls

    npm install
  displayName: Install NPM Packages

# =====================================================
# INSTALL PLAYWRIGHT BROWSERS
# =====================================================

- script: |
    cd $(Build.SourcesDirectory)
    cd *

    npx playwright install --with-deps
  displayName: Install Playwright Browsers

# =====================================================
# RUN PLAYWRIGHT TESTS
# =====================================================

- script: |
    cd $(Build.SourcesDirectory)
    cd *

    npx playwright test
  displayName: Run Playwright Tests

# =====================================================
# COPY PLAYWRIGHT REPORT
# =====================================================

- script: |
    mkdir -p $(Build.ArtifactStagingDirectory)/playwright-report

    cd $(Build.SourcesDirectory)
    cd *

    cp -R playwright-report/* $(Build.ArtifactStagingDirectory)/playwright-report
  displayName: Copy Playwright Report

# =====================================================
# PUBLISH PLAYWRIGHT REPORT
# =====================================================

- task: PublishPipelineArtifact@1
  displayName: Publish Playwright Report

  condition: always()

  inputs:
    targetPath: '$(Build.ArtifactStagingDirectory)/playwright-report'
    artifact: 'playwright-report'
    publishLocation: 'pipeline'